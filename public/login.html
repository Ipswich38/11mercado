<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11Mercado - Member Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fadeIn {
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-10">
      <div
        class="absolute inset-0"
        style="
          background-image:
            radial-gradient(circle at 25% 25%, white 2px, transparent 2px),
            radial-gradient(circle at 75% 75%, white 2px, transparent 2px);
          background-size: 50px 50px;
        "
      ></div>
    </div>

    <!-- Main Login Container -->
    <div class="relative z-10 w-full max-w-md">
      <!-- Logo & Title -->
      <div class="text-center mb-8 animate-fadeIn">
        <div
          class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl"
        >
          <span
            class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent"
            >11M</span
          >
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">Welcome to 11Mercado</h1>
        <p class="text-purple-100">Exclusive Platform for Students & Parents</p>
      </div>

      <!-- Access Form -->
      <div
        class="glass-card rounded-2xl p-8 shadow-2xl animate-fadeIn"
        style="animation-delay: 0.2s"
      >
        <form id="accessForm" class="space-y-6">
          <!-- Nickname Input -->
          <div>
            <label
              for="nickname"
              class="block text-sm font-medium text-white mb-2"
            >
              👤 Name / Nickname
            </label>
            <input
              type="text"
              id="nickname"
              name="nickname"
              required
              maxlength="50"
              class="w-full px-4 py-3 bg-white/20 border border-white/30 rounded-lg text-white placeholder-purple-200 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all"
              placeholder="Enter your name"
            />
          </div>

          <!-- Access Code Input -->
          <div>
            <label
              for="accessCode"
              class="block text-sm font-medium text-white mb-2"
            >
              🔑 Access Code
            </label>
            <input
              type="password"
              id="accessCode"
              name="accessCode"
              required
              class="w-full px-4 py-3 bg-white/20 border border-white/30 rounded-lg text-white placeholder-purple-200 focus:outline-none focus:ring-2 focus:ring-white/50 focus:border-transparent transition-all"
              placeholder="Enter access code"
            />
          </div>

          <!-- Admin Login Toggle -->
          <div class="flex items-center">
            <input
              type="checkbox"
              id="adminLogin"
              class="w-4 h-4 text-purple-600 bg-white/20 border-white/30 rounded focus:ring-purple-500"
            />
            <label for="adminLogin" class="ml-2 text-sm text-purple-100">
              👩‍💼 Admin Login
            </label>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="enterButton"
            class="w-full bg-white text-purple-600 font-semibold py-3 px-6 rounded-lg hover:bg-purple-50 transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
          >
            🚀 Enter Platform
          </button>
        </form>

        <!-- Status Messages -->
        <div id="statusMessage" class="mt-4 p-3 rounded-lg hidden"></div>

        <!-- Active Users Counter -->
        <div class="mt-6 text-center">
          <div
            class="inline-flex items-center space-x-2 bg-white/10 rounded-full px-4 py-2"
          >
            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
            <span class="text-white text-sm">
              <span id="activeCount">--</span>/100 members online
            </span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div
        class="text-center mt-8 text-purple-200 text-sm animate-fadeIn"
        style="animation-delay: 0.4s"
      >
        <p>🔒 Secure access for DepEd CSJ-DMNSHS community only</p>
        <p class="mt-1">Access is logged for security purposes</p>

        <!-- Debug/Troubleshooting -->
        <div class="mt-4 space-x-2">
          <button
            onclick="clearCache()"
            class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded transition-colors"
          >
            🧹 Clear Cache
          </button>
          <button
            onclick="testCredentials()"
            class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded transition-colors"
          >
            🔍 Test Login
          </button>
        </div>
      </div>
    </div>

    <script>
      // Configuration
      const CONFIG = {
        USER_ACCESS_CODE: 'MERCADO112025',
        ADMIN_ACCESS_CODE: 'ADMIN2025MERCADO',
        ADMIN_EMAIL: '11mercado.pta@gmail.com',
        MAX_USERS: 100,
        SESSION_TIMEOUT: 30 * 60 * 1000, // 30 minutes
        API_BASE: 'https://api.11mercado.com', // Replace with your actual API
      };

      // Local storage keys
      const STORAGE_KEYS = {
        ACCESS_TOKEN: '11m_access_token',
        USER_SESSION: '11m_user_session',
        ADMIN_SESSION: '11m_admin_session',
      };

      // Session management
      class SessionManager {
        constructor() {
          this.sessions = this.loadSessions();
          this.updateActiveCount();
          this.startCleanupTimer();
        }

        loadSessions() {
          const stored = localStorage.getItem('11m_all_sessions');
          return stored ? JSON.parse(stored) : {};
        }

        saveSessions() {
          localStorage.setItem(
            '11m_all_sessions',
            JSON.stringify(this.sessions),
          );
        }

        addSession(nickname, isAdmin = false) {
          const sessionId = this.generateSessionId();
          const session = {
            id: sessionId,
            nickname: nickname,
            isAdmin: isAdmin,
            timestamp: Date.now(),
            lastActivity: Date.now(),
            ip: this.getClientIP(),
          };

          this.sessions[sessionId] = session;
          this.saveSessions();

          // Store current user session
          localStorage.setItem(
            STORAGE_KEYS.USER_SESSION,
            JSON.stringify(session),
          );

          if (isAdmin) {
            localStorage.setItem(
              STORAGE_KEYS.ADMIN_SESSION,
              JSON.stringify(session),
            );
          }

          return session;
        }

        getActiveSessionCount() {
          const now = Date.now();
          const activeSessions = Object.values(this.sessions).filter(
            (session) => now - session.lastActivity < CONFIG.SESSION_TIMEOUT,
          );
          return activeSessions.length;
        }

        cleanupExpiredSessions() {
          const now = Date.now();
          Object.keys(this.sessions).forEach((sessionId) => {
            if (
              now - this.sessions[sessionId].lastActivity >
              CONFIG.SESSION_TIMEOUT
            ) {
              delete this.sessions[sessionId];
            }
          });
          this.saveSessions();
          this.updateActiveCount();
        }

        generateSessionId() {
          return (
            'session_' +
            Date.now() +
            '_' +
            Math.random().toString(36).substr(2, 9)
          );
        }

        getClientIP() {
          // In production, this would be handled by the backend
          return '127.0.0.1';
        }

        updateActiveCount() {
          document.getElementById('activeCount').textContent =
            this.getActiveSessionCount();
        }

        startCleanupTimer() {
          setInterval(() => {
            this.cleanupExpiredSessions();
          }, 60000); // Clean every minute
        }
      }

      // Initialize session manager
      const sessionManager = new SessionManager();

      // Form handling
      document
        .getElementById('accessForm')
        .addEventListener('submit', async function (e) {
          e.preventDefault();

          const nickname = document.getElementById('nickname').value.trim();
          const accessCode = document.getElementById('accessCode').value.trim();
          const isAdmin = document.getElementById('adminLogin').checked;
          const button = document.getElementById('enterButton');
          const statusDiv = document.getElementById('statusMessage');

          // Validation
          if (!nickname) {
            showStatus('Please enter your name', 'error');
            return;
          }

          if (!accessCode) {
            showStatus('Please enter the access code', 'error');
            return;
          }

          // Show loading
          button.textContent = '🔄 Verifying...';
          button.disabled = true;

          try {
            await new Promise((resolve) => setTimeout(resolve, 1000)); // Simulate API call

            // Check access code based on admin status
            const expectedCode = isAdmin ? CONFIG.ADMIN_ACCESS_CODE : CONFIG.USER_ACCESS_CODE;
            if (accessCode !== expectedCode) {
              const codeType = isAdmin ? 'admin access code' : 'user access code';
              throw new Error(`Invalid ${codeType}`);
            }

            // Check if admin
            if (isAdmin && nickname !== CONFIG.ADMIN_EMAIL) {
              throw new Error(`Unauthorized admin access. Use admin email: ${CONFIG.ADMIN_EMAIL}`);
            }

            // Check capacity (only for non-admin)
            if (
              !isAdmin &&
              sessionManager.getActiveSessionCount() >= CONFIG.MAX_USERS
            ) {
              throw new Error(
                'Platform is at full capacity (100 users). Please try again later.',
              );
            }

            // Create session
            const session = sessionManager.addSession(nickname, isAdmin);

            // Log access
            console.log('Access granted:', {
              nickname: nickname,
              isAdmin: isAdmin,
              timestamp: new Date().toISOString(),
              sessionId: session.id,
            });

            showStatus(`Welcome ${nickname}! Redirecting...`, 'success');

            // Redirect after success
            setTimeout(() => {
              if (isAdmin) {
                window.location.href = 'admin-dashboard.html';
              } else {
                window.location.href = 'index.html';
              }
            }, 1500);
          } catch (error) {
            showStatus(error.message, 'error');
            button.textContent = '🚀 Enter Platform';
            button.disabled = false;
          }
        });

      function showStatus(message, type) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.className = `mt-4 p-3 rounded-lg ${type === 'error' ? 'bg-red-500/20 border border-red-400 text-red-100' : 'bg-green-500/20 border border-green-400 text-green-100'}`;
        statusDiv.textContent = message;
        statusDiv.classList.remove('hidden');

        if (type === 'success') {
          setTimeout(() => {
            statusDiv.classList.add('hidden');
          }, 3000);
        }
      }

      // Add debug function
      function debugCredentials() {
        console.log('=== LOGIN DEBUG INFO ===');
        console.log('Expected User Access Code:', CONFIG.USER_ACCESS_CODE);
        console.log('Expected Admin Access Code:', CONFIG.ADMIN_ACCESS_CODE);
        console.log('Expected Admin Email:', CONFIG.ADMIN_EMAIL);
        console.log(
          'Current localStorage sessions:',
          localStorage.getItem('11m_all_sessions'),
        );
        console.log('========================');
      }

      // Check if already logged in
      window.addEventListener('load', function () {
        // Debug info
        debugCredentials();

        const existingSession = localStorage.getItem(STORAGE_KEYS.USER_SESSION);
        if (existingSession) {
          try {
            const session = JSON.parse(existingSession);
            const now = Date.now();

            // Check if session is still valid
            if (now - session.lastActivity < CONFIG.SESSION_TIMEOUT) {
              // Update last activity
              session.lastActivity = now;
              localStorage.setItem(
                STORAGE_KEYS.USER_SESSION,
                JSON.stringify(session),
              );

              // Redirect to appropriate page
              if (session.isAdmin) {
                window.location.href = 'admin-dashboard.html';
              } else {
                window.location.href = 'index.html';
              }
            } else {
              // Clear expired session
              localStorage.removeItem(STORAGE_KEYS.USER_SESSION);
              localStorage.removeItem(STORAGE_KEYS.ADMIN_SESSION);
            }
          } catch (error) {
            console.error('Session parsing error:', error);
            // Clear corrupted session data
            localStorage.removeItem(STORAGE_KEYS.USER_SESSION);
            localStorage.removeItem(STORAGE_KEYS.ADMIN_SESSION);
          }
        }
      });

      // Helper functions for troubleshooting
      function clearCache() {
        if (
          confirm('This will clear all login sessions and cache. Continue?')
        ) {
          localStorage.clear();
          sessionStorage.clear();
          alert('Cache cleared! You can now try logging in again.');
          location.reload();
        }
      }

      function testCredentials() {
        const userCode = CONFIG.USER_ACCESS_CODE;
        const adminCode = CONFIG.ADMIN_ACCESS_CODE;
        const expectedEmail = CONFIG.ADMIN_EMAIL;

        alert(
          `🔍 CURRENT CREDENTIALS:\n\n👥 USER LOGIN:\n✅ Name: Any name\n✅ Access Code: "${userCode}"\n✅ Admin Login: Leave unchecked\n\n👩‍💼 ADMIN LOGIN:\n✅ Name: "${expectedEmail}"\n✅ Admin Access Code: "${adminCode}"\n✅ Admin Login: Check the box\n\n📝 Login Steps:\n• Regular users: Enter any name + "${userCode}"\n• Admin: Enter "${expectedEmail}" + "${adminCode}" + check "Admin Login"\n\nCheck browser console (F12) for detailed logs.`,
        );

        console.log('=== CREDENTIAL TEST ===');
        console.log('User Access Code:', userCode);
        console.log('Admin Access Code:', adminCode);
        console.log('Admin Email:', expectedEmail);
        console.log('Form validation will check:');
        console.log('- Access code matches based on login type');
        console.log('- Admin email matches exactly (for admin login)');
        console.log('- Admin checkbox is checked (for admin login)');
      }

      // Update active count every 30 seconds
      setInterval(() => {
        sessionManager.updateActiveCount();
      }, 30000);
    </script>
  </body>
</html>
